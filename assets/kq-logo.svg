<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180">
  <title>KatalystQue</title>
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f4e090"/>
      <stop offset="48%"  stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#6e4e18"/>
    </linearGradient>
  </defs>

  <!-- K — vertical stem -->
  <line x1="18" y1="22" x2="18" y2="158"
        stroke="url(#gold)" stroke-width="13" stroke-linecap="square"/>
  <!-- K — upper arm -->
  <line x1="18" y1="90" x2="80" y2="22"
        stroke="url(#gold)" stroke-width="13" stroke-linecap="round"/>
  <!-- K — lower arm -->
  <line x1="18" y1="90" x2="80" y2="158"
        stroke="url(#gold)" stroke-width="13" stroke-linecap="round"/>

  <!-- Q — ring -->
  <circle cx="148" cy="90" r="44"
          fill="none" stroke="url(#gold)" stroke-width="13"/>

  <!-- Q — tail -->
  <line x1="170" y1="114" x2="192" y2="146"
        stroke="url(#gold)" stroke-width="13" stroke-linecap="round"/>
</svg>
